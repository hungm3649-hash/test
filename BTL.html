<!DOCTYPE html>
<html lang="vi">
<head>
  <title>Cửa hàng Thời Trang</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    header, nav, footer { background: #333; color: #fff; padding: 15px; text-align: center; }
    nav ul { list-style: none; margin: 0; padding: 0; display: flex; justify-content: center; }
    nav ul li { margin: 0 20px; }
    nav ul li a { color: #fff; text-decoration: none; }
    .container { display: flex; }
    .sidebar { width: 25%; padding: 15px; background: #f9f9f9; }
    .content { width: 75%; padding: 15px; }
    article { margin-bottom: 25px; border-bottom: 1px solid #ddd; padding-bottom: 15px; }
    article img { max-width: 250px; display: block; margin-bottom: 10px; }
    footer { font-size: 14px; }
  </style>
</head>
<body>
  <header>
    <img src="D:\BuiManhHung_TT1D24\Image\Mau-banner-quang-cao-dep-1.png" alt="Banner thời trang" style="width:100%; height:200px;">
    <h1>Cửa hàng Quần Áo Thời Trang</h1>
  </header>
  <nav>
    <ul>
      <li><a href="#">Trang chủ</a></li>
      <li><a href="#">Sản phẩm</a></li>
      <li><a href="#">Khuyến mãi</a></li>
      <li><a href="#">Liên hệ</a></li>
    </ul>
  </nav>

  <div class="container">
    <aside class="sidebar">
      <h2>Đăng nhập khách hàng</h2>
      <form onsubmit="return validateForm()">
        <label for="username">Email:</label><br>
        <input type="email" id="username" name="username"><br>
        <label for="password">Mật khẩu:</label><br>
        <input type="password" id="password" name="password"><br><br>
        <input type="submit" value="Đăng nhập">
      </form>
    </aside>

    <!-- Body Area -->
    <main class="content">
      <article>
        <h2>Áo sơ mi nam</h2>
        <img src="D:\BuiManhHung_TT1D24\Image\download.jpg" alt="Áo sơ mi nam">
        <p>Áo sơ mi nam phong cách Hàn Quốc, chất liệu cotton thoáng mát.</p>
      </article>
      <article>
        <h2>Đầm nữ mùa hè</h2>
        <img src="D:\BuiManhHung_TT1D24\Image\20230601_pqfbrE8h.jpg" alt="Đầm nữ mùa hè">
        <p>Đầm nữ thiết kế trẻ trung, phù hợp đi chơi, dạo phố.</p>
      </article>
    </main>
  </div>
  <footer>
    Bùi Mạnh Hùng – TT1D24
  </footer>

  <script>
    function validateForm() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;
      if (user === "" || pass === "") {
        alert("Vui lòng nhập đầy đủ thông tin!");
        return false;
      }
      return true;
    }
  </script>
</body>
</html>
