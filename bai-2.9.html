<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tin tức 24H</title>
    <style>
        body {
    width: 80%;
    font-family: 'Times New Roman', Times, serif;
    background-color: #f5f7fa;
    margin: 0 auto;
}
* {
    box-sizing: border-box;
}

/* HEADER */
.top {
    width: 100%;
    height: 100px;
    text-align: center;
    position: relative;
    background: linear-gradient(to right, #e3eaf2, #f8f9fb);
}
.top img {
    width: 80px;
    height: 80px;
    position: absolute;
    top: 10px;
    left: 10px;
    border-radius: 10px;
}
.top h1 {
    margin: 0;
    line-height: 100px;
    font-size: 35px;
    color: #0d47a1;
    font-weight: bold;
}

/* MENU */
.menu1 {
    background: #0d47a1;
    height: 50px;
}
.menu1 ul {
    margin: 0;
    padding-left: 20px;
}
.menu1 li {
    display: inline-block;
    margin-right: 25px;
    line-height: 50px;
}
.menu1 a {
    text-decoration: none;
    font-weight: bold;
    color: white;
    font-size: 16px;
    padding: 8px 10px;
    border-radius: 5px;
}
.menu1 a:hover {
    background: #1976d2;
}

/* CONTAINER */
.container {
    display: flex;
    background: white;
    padding: 25px;
    margin-top: 10px;
    border-radius: 8px;
}

/* LEFT LABEL */
.left {
    width: 20%;
    line-height: 35px;
    color: #333;
    font-weight: bold;
}

/* FORM */
.center {
    width: 45%;
}
.center input,
.center select,
.center textarea {
    width: 100%;
    margin-bottom: 10px;
    padding: 6px;
    border: 1px solid #ccc;
    border-radius: 5px;
}
.center textarea {
    height: 120px;
}

/* BUTTON */
.center input[type="submit"] {
    background: #2e7d32;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 5px;
}
.center input[type="reset"] {
    background: #1565c0;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 5px;
}
.center input[type="submit"]:hover {
    background: #43a047;
}
.center input[type="reset"]:hover {
    background: #1e88e5;
}

/* SIDEBAR */
.right {
    width: 35%;
    padding-left: 40px;
    border-left: 2px solid #eee;
}
.right ul {
    list-style: none;
    padding: 0;
}
.right li {
    margin-bottom: 12px;
}
.right a {
    text-decoration: none;
    color: #0d47a1;
    font-weight: bold;
}
.right a:hover {
    color: #1976d2;
}

/* FOOTER */
.bottom {
    text-align: center;
    padding: 15px 0;
    background: #e3eaf2;
    color: #0d47a1;
    margin-top: 10px;
    border-radius: 5px;
}
    </style>
</head>
<body>
    <div class="top">
        <img src="https://cdn.24h.com.vn/upload/2-2018/images/2018-06-14/logo-chan-trang-24h.png">
        <h1>TIN TỨC 24H</h1>
    </div>

    <div class="menu1">
        <ul>
            <li><a href="#">Chính trị</a></li>
            <li><a href="#">Xã hội</a></li>
            <li><a href="#">Sức khỏe</a></li>
            <li><a href="#">Giáo dục</a></li>
            <li><a href="#">Thể thao</a></li>
            <li><a href="#">Liên hệ</a></li>
        </ul>
    </div>

    <div class="container">
        <div class="left">
            <label>Họ tên: <span class="required">*</span></label><br>
            <label>Địa chỉ: </label><br>
            <label>Số điện thoại: <span class="required">*</span></label><br>
            <label>Giới tính: </label><br>
            <label style="margin-top: 5px; display: block;">Năm sinh: </label><br>
            <label style="margin-top: 5px; display: block;">Nội dung liên hệ: <span class="required">*</span></label>
        </div>

        <div class="center">
            <form>
                <input type="text" placeholder="Họ tên">
                <input type="text" placeholder="Địa chỉ">
                <input type="tel" placeholder="Số điện thoại">
                
                <div style="margin-bottom: 15px;">
                    <input type="radio" name="gt" id="nam"> <label for="nam">Nam</label>
                    <input type="radio" name="gt" id="nu"> <label for="nu">Nữ</label>
                </div>

                <select>
                    <option>2003</option>
                    <option>2004</option>
                    <option>2005</option>
                </select>

                <textarea></textarea>

                <div style="margin-top: 10px;">
                    <input type="submit" class="submit" value="Gửi thông tin góp ý">
                    <input type="reset" class="reset" value="Nhập lại">
                </div>
            </form>
        </div>

        <div class="right">
            <ul>
                <li><a href="#">Tin tức thị trường</a></li>
                <li><a href="#">Tin tức trong ngày</a></li>
                <li><a href="#">Thông tin chứng khoán</a></li>
                <li><a href="#">Sức khỏe đời sống</a></li>
                <li><a href="#">Công nghệ thông tin</a></li>
            </ul>
        </div>
    </div>

    <div class="bottom">
        <p>Cơ quan chủ quản: Công ty Cổ phần Quảng cáo Trực tuyến 24H<br><b>© 24h.com</b></p>
    </div>
</body>
</html>
